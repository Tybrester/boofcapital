<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoofCapital — Bots</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1f1f1f;
      --accent: #00e676; --accent-dim: #00c853; --red: #ff1744;
      --text: #f5f5f5; --muted: #888; --card-bg: #141414;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    #loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #app { display: none; flex-direction: column; min-height: 100vh; }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; background: rgba(10,10,10,0.95); border-bottom: 1px solid var(--border); flex-shrink: 0; position: sticky; top: 0; z-index: 100; }
    .logo { font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .user-dropdown { position: relative; }
    .user-dropdown-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; color: var(--muted); font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .user-dropdown-toggle:hover { background: #1a1a1a; color: var(--text); }
    .user-dropdown-menu { display: none; position: absolute; right: 0; top: calc(100% + 8px); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; min-width: 160px; z-index: 200; }
    .user-dropdown.open .user-dropdown-menu { display: block; }
    .user-dropdown-item { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 7px; font-size: 0.86rem; color: var(--muted); cursor: pointer; background: none; border: none; width: 100%; font-family: inherit; transition: background 0.15s, color 0.15s; }
    .user-dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .user-dropdown-item.red:hover { background: rgba(255,23,68,0.08); color: var(--red); }

    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 230px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px 0; height: calc(100vh - 64px); position: sticky; top: 64px; overflow-y: auto; }
    .sidebar-section { padding: 6px 12px; font-size: 0.7rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 12px; }
    .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; font-size: 0.9rem; font-weight: 500; color: var(--muted); text-decoration: none; transition: background 0.15s, color 0.15s; position: relative; border: none; background: none; font-family: inherit; width: 100%; text-align: left; cursor: pointer; }
    .sidebar-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar-item.active { background: rgba(0,230,118,0.08); color: var(--accent); font-weight: 600; }
    .sidebar-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }

    main { flex: 1; padding: 28px 36px; overflow-y: auto; }
    .page-header { margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .page-header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.02em; }
    .btn-primary { background: var(--accent); color: #000; font-size: 0.88rem; font-weight: 800; padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent-dim); }

    /* ── P&L Banner ─────────────────────────────── */
    .pnl-banner { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 28px; }
    .pnl-banner-item { display: flex; flex-direction: column; gap: 4px; }
    .pnl-banner-label { font-size: 0.68rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
    .pnl-banner-value { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em; }
    .pnl-banner-sub { font-size: 0.73rem; color: var(--muted); }

    /* ── Bot Cards ──────────────────────────────── */
    .bots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
    .bot-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; gap: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
    .bot-card.running { border-color: rgba(0,230,118,0.35); box-shadow: 0 0 24px rgba(0,230,118,0.07); }
    .bot-card.stopped { opacity: 0.7; }
    .bot-name { font-size: 1.05rem; font-weight: 800; }
    .section-label { font-size: 0.7rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

    /* Status badge */
    .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; }
    .status-badge::before { content: ''; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .status-badge.running { background: rgba(0,230,118,0.12); color: var(--accent); border: 1px solid rgba(0,230,118,0.25); }
    .status-badge.running::before { background: var(--accent); box-shadow: 0 0 5px var(--accent); animation: pulse 2s infinite; }
    .status-badge.stopped { background: rgba(255,255,255,0.04); color: #666; border: 1px solid #222; }
    .status-badge.stopped::before { background: #444; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    /* Bot toggle */
    .big-toggle-wrap { display: flex; align-items: center; justify-content: space-between; background: #0f0f0f; border-radius: 10px; padding: 14px 16px; }
    .big-toggle-label { font-size: 1rem; font-weight: 700; }
    .big-toggle-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .big-toggle-switch { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
    .big-toggle-switch input { opacity: 0; width: 0; height: 0; }
    .big-toggle-slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 28px; cursor: pointer; transition: background 0.2s; }
    .big-toggle-slider:before { content: ''; position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background: #666; border-radius: 50%; transition: transform 0.2s, background 0.2s; }
    .big-toggle-switch input:checked + .big-toggle-slider { background: rgba(0,230,118,0.25); }
    .big-toggle-switch input:checked + .big-toggle-slider:before { transform: translateX(24px); background: var(--accent); }

    /* Settings */
    .auto-settings { display: flex; flex-direction: column; gap: 12px; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; padding: 14px; }
    .auto-settings-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.84rem; color: var(--muted); gap: 10px; }
    .auto-input { background: #141414; border: 1px solid #2a2a2a; color: var(--text); font-family: inherit; font-size: 0.84rem; padding: 7px 10px; border-radius: 6px; outline: none; transition: border-color 0.15s; }
    .auto-input:focus { border-color: var(--accent); }
    .auto-input.wide { width: 130px; }

    /* Lock overlay */
    .settings-lock-wrap { position: relative; }
    .settings-lock-overlay { position: absolute; inset: 0; background: rgba(10,10,10,0.8); border-radius: 10px; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; backdrop-filter: blur(2px); }
    .settings-lock-overlay.hidden { display: none; }
    .settings-lock-msg { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-align: center; line-height: 1.5; }
    .settings-lock-msg span { color: var(--red); }

    /* Direction / Scan pills */
    .dir-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid #2a2a2a; background: transparent; color: var(--muted); font-size: 0.75rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .dir-pill:hover { border-color: #444; color: var(--text); }
    .dir-pill.active { border-color: var(--accent); background: rgba(0,230,118,0.1); color: var(--accent); }
    .dir-pill.active.short { border-color: var(--red); background: rgba(255,23,68,0.1); color: var(--red); }

    /* Broker tag */
    .broker-tag { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 3px 10px; border-radius: 20px; display: inline-block; }
    .broker-paper { background: rgba(0,230,118,0.1); color: var(--accent); }
    .broker-tasty { background: rgba(255,112,67,0.12); color: #ff7043; }
    .broker-warn { font-size: 0.72rem; color: #ff7043; display: flex; align-items: center; gap: 6px; background: rgba(255,112,67,0.08); border: 1px solid rgba(255,112,67,0.2); border-radius: 6px; padding: 8px 10px; }

    /* Buttons */
    .save-btn { background: var(--accent); color: #000; font-size: 0.8rem; font-weight: 800; padding: 7px 18px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .save-btn:hover { background: var(--accent-dim); }
    .save-result { font-size: 0.76rem; min-height: 16px; }
    .save-result.ok { color: var(--accent); }
    .save-result.err { color: var(--red); }

    /* P&L per card */
    .pnl-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .pnl-box { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 8px; padding: 10px 14px; text-align: center; }
    .pnl-box-label { font-size: 0.65rem; color: #555; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .pnl-box-value { font-size: 0.95rem; font-weight: 800; margin-top: 2px; }
    .green { color: var(--accent); }
    .red { color: var(--red); }
    .neutral { color: var(--text); }

    /* Trade log */
    .trade-log-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #141414; font-size: 0.8rem; }
    .trade-log-row:last-child { border-bottom: none; }
    .trade-action { font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .trade-action.buy { background: rgba(0,230,118,0.1); color: var(--accent); }
    .trade-action.sell { background: rgba(255,23,68,0.1); color: var(--red); }

    /* Delete button */
    .delete-btn { background: none; border: 1px solid #2a2a2a; color: #555; font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.15s; }
    .delete-btn:hover { border-color: var(--red); color: var(--red); }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; display: flex; align-items: center; justify-content: center; }
    .modal-overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 16px; }
    .modal h2 { font-size: 1.1rem; font-weight: 800; }
    .modal-field { display: flex; flex-direction: column; gap: 6px; }
    .modal-label { font-size: 0.78rem; font-weight: 600; color: var(--muted); }
    .modal-input { background: #0f0f0f; border: 1px solid #2a2a2a; color: var(--text); font-family: inherit; font-size: 0.9rem; padding: 10px 12px; border-radius: 8px; outline: none; }
    .modal-input:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-cancel { background: none; border: 1px solid #2a2a2a; color: var(--muted); font-size: 0.84rem; font-weight: 600; padding: 9px 18px; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .modal-cancel:hover { border-color: #444; color: var(--text); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; border: 1px dashed var(--border); border-radius: 10px; }

    @media (max-width: 900px) { .sidebar { display: none; } main { padding: 20px 16px; } }
  </style>
</head>
<body>

  <div id="loading-screen"><div class="spinner"></div></div>

  <!-- Create Bot Modal -->
  <div class="modal-overlay hidden" id="create-modal">
    <div class="modal">
      <h2>Create New Bot</h2>
      <div class="modal-field">
        <label class="modal-label">Bot Name</label>
        <input class="modal-input" id="new-bot-name" placeholder="e.g. SPY Trend Bot" />
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="createBot()">Create Bot</button>
      </div>
    </div>
  </div>

  <div id="app">
    <nav>
      <a href="dashboard.html" class="logo">Boof<span>Capital</span></a>
      <div class="nav-right">
        <div class="user-dropdown" id="user-dropdown">
          <button class="user-dropdown-toggle" id="user-email-toggle" onclick="document.getElementById('user-dropdown').classList.toggle('open')">
            <span id="user-email"></span>
          </button>
          <div class="user-dropdown-menu">
            <button class="user-dropdown-item red" onclick="signOut()">🚪 Sign Out</button>
          </div>
        </div>
      </div>
    </nav>

    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">Menu</div>
        <a href="dashboard.html" class="sidebar-item">Dashboard</a>
        <a href="alerts.html" class="sidebar-item">Systems</a>
        <a href="accounts.html" class="sidebar-item">Accounts</a>
        <div class="sidebar-section">Trading</div>
        <a href="trades.html" class="sidebar-item">Trades</a>
        <a href="brokers.html" class="sidebar-item">Brokers</a>
        <a href="bots.html" class="sidebar-item active">Bots</a>
        <div class="sidebar-section" style="margin-top:24px;">Help</div>
        <a href="how-it-works.html" class="sidebar-item">How it Works</a>
      </aside>

      <main>
        <div class="page-header">
          <h1>Bots</h1>
          <button class="btn-primary" onclick="openModal()">+ New Bot</button>
        </div>

        <div id="bots-container">
          <div class="empty-state">Loading...</div>
        </div>

        <div style="text-align:center;padding:24px;font-size:0.85rem;color:#444;margin-top:auto;">
          Contact: <a href="mailto:BoofCapital@gmail.com" style="color:#555;text-decoration:none;">BoofCapital@gmail.com</a>
        </div>
      </main>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://isanhutzyctcjygjhzbn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzYW5odXR6eWN0Y2p5Z2poemJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTYzNDYsImV4cCI6MjA5MTY5MjM0Nn0.L0ATp-IriR708C2n3as_YXDgjHvtn_CWubbzPeSxRi0';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let uid = null;

    // ── Auth ─────────────────────────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'index.html'; return; }
      uid = session.user.id;
      document.getElementById('user-email').textContent = session.user.email;
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      await loadBots();
    }
    async function signOut() { await sb.auth.signOut(); window.location.href = 'index.html'; }

    // ── Modal ────────────────────────────────────────────────────────────────
    function openModal() { document.getElementById('create-modal').classList.remove('hidden'); document.getElementById('new-bot-name').focus(); }
    function closeModal() { document.getElementById('create-modal').classList.add('hidden'); document.getElementById('new-bot-name').value = ''; }
    async function createBot() {
      const name = document.getElementById('new-bot-name').value.trim();
      if (!name) return;
      const { error } = await sb.from('bots').insert({ user_id: uid, name });
      if (error) { alert('Error creating bot: ' + error.message); return; }
      closeModal();
      await loadBots();
    }

    // ── Load Bots ────────────────────────────────────────────────────────────
    async function loadBots() {
      const container = document.getElementById('bots-container');

      const [{ data: bots }, { data: allTrades }] = await Promise.all([
        sb.from('bots').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
        sb.from('bot_trades').select('*').eq('user_id', uid).order('created_at', { ascending: false }),
      ]);

      if (!bots || bots.length === 0) {
        container.innerHTML = `<div class="empty-state">
          <div style="font-size:2rem;margin-bottom:12px;">🤖</div>
          <div style="font-weight:700;font-size:1rem;margin-bottom:6px;">No bots yet</div>
          <div style="margin-bottom:16px;">Create your first auto-trading bot to get started.</div>
          <button class="btn-primary" onclick="openModal()">+ New Bot</button>
        </div>`;
        return;
      }

      // ── Build stats per bot ──────────────────────────────────────────────
      const trades = allTrades || [];
      const statsMap = {};
      trades.forEach(t => {
        if (!statsMap[t.bot_id]) statsMap[t.bot_id] = { total: 0, closed: 0, wins: 0, pnl: 0, open: 0, recent: [] };
        const s = statsMap[t.bot_id];
        s.total++;
        if (t.status === 'closed') { s.closed++; if (t.pnl > 0) s.wins++; s.pnl += Number(t.pnl || 0); }
        if (t.status === 'open') s.open++;
        if (s.recent.length < 5) s.recent.push(t);
      });
      Object.values(statsMap).forEach(s => { s.winRate = s.closed > 0 ? Math.round(s.wins / s.closed * 100) : 0; });

      // ── Overall banner ───────────────────────────────────────────────────
      const totalPnl = trades.filter(t => t.pnl != null).reduce((a, t) => a + Number(t.pnl), 0);
      const closedAll = trades.filter(t => t.status === 'closed');
      const winsAll = closedAll.filter(t => t.pnl > 0).length;
      const wrAll = closedAll.length > 0 ? Math.round(winsAll / closedAll.length * 100) : 0;
      const openAll = trades.filter(t => t.status === 'open').length;
      const activeBots = bots.filter(b => b.enabled).length;

      container.innerHTML = `
        <div class="pnl-banner">
          <div class="pnl-banner-item">
            <div class="pnl-banner-label">Total P&L</div>
            <div class="pnl-banner-value" style="color:${totalPnl >= 0 ? 'var(--accent)' : 'var(--red)'};">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div>
            <div class="pnl-banner-sub">${closedAll.length} closed trades</div>
          </div>
          <div class="pnl-banner-item">
            <div class="pnl-banner-label">Win Rate</div>
            <div class="pnl-banner-value" style="color:${wrAll >= 50 ? 'var(--accent)' : 'var(--red)'};">${wrAll}%</div>
            <div class="pnl-banner-sub">${winsAll}W / ${closedAll.length - winsAll}L</div>
          </div>
          <div class="pnl-banner-item">
            <div class="pnl-banner-label">Open Positions</div>
            <div class="pnl-banner-value" style="color:var(--text);">${openAll}</div>
            <div class="pnl-banner-sub">across all bots</div>
          </div>
          <div class="pnl-banner-item">
            <div class="pnl-banner-label">Active Bots</div>
            <div class="pnl-banner-value" style="color:var(--accent);">${activeBots}</div>
            <div class="pnl-banner-sub">of ${bots.length} total</div>
          </div>
        </div>
      `;

      // ── Bot cards ────────────────────────────────────────────────────────
      const grid = document.createElement('div');
      grid.className = 'bots-grid';

      bots.forEach(bot => {
        const stats = statsMap[bot.id] || { total: 0, closed: 0, wins: 0, pnl: 0, open: 0, winRate: 0, recent: [] };
        const running = bot.enabled;
        const scanMode = bot.scan_mode || 'single';
        const dir = bot.trade_direction || 'both';
        const broker = bot.broker || 'paper';
        const isTasty = broker === 'tastytrade';
        const scanHints = { single: 'Uses symbol below', scan_stocks: '50 top US stocks', scan_crypto: '20 top crypto', scan_all: '50 stocks + 20 crypto' };

        const card = document.createElement('div');
        card.className = 'bot-card' + (running ? ' running' : ' stopped');
        card.id = 'card-' + bot.id;
        card.innerHTML = `
          <!-- Header -->
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
              <div class="bot-name">${bot.name}</div>
              <span class="status-badge ${running ? 'running' : 'stopped'}" id="badge-${bot.id}">${running ? 'Running' : 'Stopped'}</span>
            </div>
            <div style="display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap;">
              <span class="broker-tag ${isTasty ? 'broker-tasty' : 'broker-paper'}" id="brkTag-${bot.id}">${isTasty ? 'Tastytrade' : 'Paper'}</span>
              <span style="font-size:0.72rem;color:#555;" id="detail-${bot.id}">${running ? (scanMode === 'single' ? 'Auto-trading · checks every hour' : 'Scanning markets every hour') : 'Stopped — not running'}</span>
            </div>
          </div>

          <!-- Master toggle -->
          <div class="big-toggle-wrap">
            <div>
              <div class="big-toggle-label">Bot Active</div>
            </div>
            <label class="big-toggle-switch">
              <input type="checkbox" id="tog-${bot.id}" ${running ? 'checked' : ''} onchange="toggleBot('${bot.id}', this.checked)" />
              <span class="big-toggle-slider"></span>
            </label>
          </div>

          <!-- Settings panel -->
          <div>
            <div class="section-label">Settings</div>
            <div class="settings-lock-wrap">
              <div id="lock-${bot.id}" class="settings-lock-overlay ${running ? '' : 'hidden'}">
                <div style="font-size:1.4rem;">🔒</div>
                <div class="settings-lock-msg">Turn off the bot to<br/><span>edit settings</span></div>
              </div>
              <div class="auto-settings">
                <!-- Scan Mode -->
                <div class="auto-settings-row" style="align-items:flex-start;">
                  <span style="padding-top:3px;">Scan Mode</span>
                  <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
                    <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;">
                      <button type="button" class="dir-pill ${scanMode==='single'?'active':''}" id="scan-single-${bot.id}" onclick="setScan('${bot.id}','single')">Single</button>
                      <button type="button" class="dir-pill ${scanMode==='scan_stocks'?'active':''}" id="scan-scan_stocks-${bot.id}" onclick="setScan('${bot.id}','scan_stocks')">Top Stocks</button>
                      <button type="button" class="dir-pill ${scanMode==='scan_crypto'?'active':''}" id="scan-scan_crypto-${bot.id}" onclick="setScan('${bot.id}','scan_crypto')">Top Crypto</button>
                      <button type="button" class="dir-pill ${scanMode==='scan_all'?'active':''}" id="scan-scan_all-${bot.id}" onclick="setScan('${bot.id}','scan_all')">All Markets</button>
                    </div>
                    <div id="scanhint-${bot.id}" style="font-size:0.7rem;color:#555;">${scanHints[scanMode] || ''}</div>
                  </div>
                  <input type="hidden" id="scanval-${bot.id}" value="${scanMode}" />
                </div>
                <!-- Symbol (single mode only) -->
                <div class="auto-settings-row" id="symrow-${bot.id}" style="display:${scanMode==='single'?'flex':'none'};">
                  <span>Symbol</span>
                  <input class="auto-input wide" id="sym-${bot.id}" type="text" value="${bot.symbol || 'SPY'}" placeholder="e.g. SPY" />
                </div>
                <!-- Dollar Amount -->
                <div class="auto-settings-row">
                  <span>$ Per Trade</span>
                  <input class="auto-input" id="amt-${bot.id}" type="number" value="${bot.dollar_amount || 500}" min="1" style="width:100px;" />
                </div>
                <!-- Interval -->
                <div class="auto-settings-row">
                  <span>Interval</span>
                  <select class="auto-input" id="int-${bot.id}" style="width:110px;">
                    ${['1m','5m','15m','30m','1h','4h','1d'].map(v => `<option value="${v}" ${bot.interval===v?'selected':''}>${v}</option>`).join('')}
                  </select>
                </div>
                <!-- Direction -->
                <div class="auto-settings-row" style="align-items:flex-start;">
                  <span style="padding-top:3px;">Direction</span>
                  <div style="display:flex;gap:6px;">
                    <button type="button" class="dir-pill ${dir==='both'?'active':''}" id="dir-both-${bot.id}" onclick="setDir('${bot.id}','both')">Both</button>
                    <button type="button" class="dir-pill ${dir==='long'?'active':''}" id="dir-long-${bot.id}" onclick="setDir('${bot.id}','long')">Long</button>
                    <button type="button" class="dir-pill ${dir==='short'?'active short':''}" id="dir-short-${bot.id}" onclick="setDir('${bot.id}','short')">Short</button>
                  </div>
                  <input type="hidden" id="dirval-${bot.id}" value="${dir}" />
                </div>
                <!-- Broker -->
                <div class="auto-settings-row">
                  <span>Broker</span>
                  <select class="auto-input" id="brk-${bot.id}" style="width:150px;" onchange="onBrokerChange('${bot.id}',this.value)">
                    <option value="paper" ${!isTasty?'selected':''}>Paper Trading</option>
                    <option value="tastytrade" ${isTasty?'selected':''}>Tastytrade (Live)</option>
                  </select>
                </div>
                <div id="brkwarn-${bot.id}" class="broker-warn" style="display:${isTasty?'flex':'none'};">
                  ⚠️ Live trading — real orders will be placed on Tastytrade
                </div>
                <!-- Save -->
                <div style="display:flex;align-items:center;gap:10px;">
                  <button class="save-btn" onclick="saveSettings('${bot.id}')">Save Settings</button>
                  <span class="save-result" id="savemsg-${bot.id}"></span>
                </div>
              </div>
            </div>
          </div>

          <!-- Performance -->
          <div>
            <div class="section-label">Performance</div>
            <div class="pnl-row">
              <div class="pnl-box">
                <div class="pnl-box-label">P&L</div>
                <div class="pnl-box-value ${stats.pnl >= 0 ? 'green' : 'red'}">${stats.pnl >= 0 ? '+' : ''}$${stats.pnl.toFixed(2)}</div>
              </div>
              <div class="pnl-box">
                <div class="pnl-box-label">Win Rate</div>
                <div class="pnl-box-value neutral">${stats.winRate}%</div>
              </div>
              <div class="pnl-box">
                <div class="pnl-box-label">Trades</div>
                <div class="pnl-box-value neutral">${stats.total}</div>
              </div>
            </div>
            <!-- Recent trades -->
            <div style="margin-top:10px;">
              ${stats.recent.length === 0
                ? '<div style="font-size:0.78rem;color:#444;padding:6px 0;">No trades yet</div>'
                : stats.recent.map(t => `
                  <div class="trade-log-row">
                    <div style="display:flex;align-items:center;gap:8px;">
                      <span class="trade-action ${t.action}">${t.action.toUpperCase()}</span>
                      <span style="font-weight:700;">${t.symbol}</span>
                      <span style="color:#555;font-size:0.72rem;">@$${Number(t.entry_price).toFixed(2)}</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                      <span style="color:#555;font-size:0.72rem;">${new Date(t.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
                      <span style="font-weight:700;color:${t.pnl != null ? (t.pnl >= 0 ? 'var(--accent)' : 'var(--red)') : '#555'};">${t.pnl != null ? (t.pnl >= 0 ? '+' : '') + '$' + Number(t.pnl).toFixed(2) : 'Open'}</span>
                    </div>
                  </div>
                `).join('')
              }
            </div>
          </div>

          <!-- Delete -->
          <div style="display:flex;justify-content:flex-end;padding-top:4px;border-top:1px solid #1a1a1a;">
            <button class="delete-btn" onclick="deleteBot('${bot.id}','${bot.name.replace(/'/g,"\\'")}')">Delete Bot</button>
          </div>
        `;
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    // ── Toggle bot on/off ────────────────────────────────────────────────────
    async function toggleBot(botId, on) {
      await sb.from('bots').update({ enabled: on }).eq('id', botId);
      const badge = document.getElementById('badge-' + botId);
      const lock  = document.getElementById('lock-' + botId);
      const detail = document.getElementById('detail-' + botId);
      const card  = document.getElementById('card-' + botId);
      const scanMode = document.getElementById('scanval-' + botId)?.value || 'single';
      if (badge) { badge.className = 'status-badge ' + (on ? 'running' : 'stopped'); badge.textContent = on ? 'Running' : 'Stopped'; }
      if (lock)  lock.classList.toggle('hidden', !on);
      if (detail) detail.textContent = on ? (scanMode === 'single' ? 'Auto-trading · checks every hour' : 'Scanning markets every hour') : 'Stopped — not running';
      if (card)  { card.classList.toggle('running', on); card.classList.toggle('stopped', !on); }
    }

    // ── Scan mode pills ──────────────────────────────────────────────────────
    function setScan(botId, mode) {
      document.getElementById('scanval-' + botId).value = mode;
      ['single','scan_stocks','scan_crypto','scan_all'].forEach(m => {
        const b = document.getElementById('scan-' + m + '-' + botId);
        if (b) b.classList.toggle('active', m === mode);
      });
      const hints = { single: 'Uses symbol below', scan_stocks: '50 top US stocks', scan_crypto: '20 top crypto', scan_all: '50 stocks + 20 crypto' };
      const hint = document.getElementById('scanhint-' + botId);
      if (hint) hint.textContent = hints[mode] || '';
      const symRow = document.getElementById('symrow-' + botId);
      if (symRow) symRow.style.display = mode === 'single' ? 'flex' : 'none';
    }

    // ── Direction pills ──────────────────────────────────────────────────────
    function setDir(botId, dir) {
      document.getElementById('dirval-' + botId).value = dir;
      ['both','long','short'].forEach(d => {
        const b = document.getElementById('dir-' + d + '-' + botId);
        if (b) { b.classList.toggle('active', d === dir); b.classList.toggle('short', d === 'short' && dir === 'short'); }
      });
    }

    // ── Broker change ────────────────────────────────────────────────────────
    function onBrokerChange(botId, val) {
      const warn = document.getElementById('brkwarn-' + botId);
      if (warn) warn.style.display = val === 'tastytrade' ? 'flex' : 'none';
      const tag = document.getElementById('brkTag-' + botId);
      if (tag) { tag.textContent = val === 'tastytrade' ? 'Tastytrade' : 'Paper'; tag.className = 'broker-tag ' + (val === 'tastytrade' ? 'broker-tasty' : 'broker-paper'); }
    }

    // ── Save settings ────────────────────────────────────────────────────────
    async function saveSettings(botId) {
      const symbol       = document.getElementById('sym-' + botId)?.value.trim().toUpperCase() || 'SPY';
      const dollar_amount = parseFloat(document.getElementById('amt-' + botId)?.value) || 500;
      const interval     = document.getElementById('int-' + botId)?.value || '1h';
      const trade_direction = document.getElementById('dirval-' + botId)?.value || 'both';
      const scan_mode    = document.getElementById('scanval-' + botId)?.value || 'single';
      const broker       = document.getElementById('brk-' + botId)?.value || 'paper';
      const msg          = document.getElementById('savemsg-' + botId);

      const { error } = await sb.from('bots').update({ symbol, dollar_amount, interval, trade_direction, scan_mode, broker, updated_at: new Date().toISOString() }).eq('id', botId);
      if (msg) {
        if (error) { msg.textContent = 'Error saving'; msg.className = 'save-result err'; }
        else { msg.textContent = '✓ Saved'; msg.className = 'save-result ok'; }
        setTimeout(() => { msg.textContent = ''; msg.className = 'save-result'; }, 2000);
      }
    }

    // ── Delete bot ───────────────────────────────────────────────────────────
    async function deleteBot(botId, name) {
      if (!confirm(`Delete bot "${name}" and all its trade history? This cannot be undone.`)) return;
      await sb.from('bots').delete().eq('id', botId);
      await loadBots();
    }

    init();
  </script>
</body>
</html>
